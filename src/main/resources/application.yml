spring:
  application:
    name: smart-agent
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080

smartagent:
  ai:
    provider: zhipu
    zhipu:
      api-key: ${ZHIPU_API_KEY:your-api-key-here}
      model: glm-4-flash
      base-url: https://open.bigmodel.cn/api/paas/v4
    timeout: 60
    max-tokens: 4096
  agent:
    max-iterations: 10
    max-tool-retries: 3
  rag:
    chunk-size: 500
    chunk-overlap: 50
    top-k: 5
