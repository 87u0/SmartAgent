<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAgent - AI Agent Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🤖 SmartAgent</div>
        <div class="nav-links">
            <a href="/" class="active">首页</a>
            <a href="/chat">对话</a>
            <a href="/knowledge">知识库</a>
        </div>
    </nav>

    <div class="hero">
        <div class="hero-content">
            <h1>SmartAgent Platform</h1>
            <p class="subtitle">基于智谱 GLM + Spring Boot 的 AI Agent 服务平台</p>
            <div class="hero-features">
                <div class="feature-card">
                    <div class="feature-icon">🧠</div>
                    <h3>AI Agent 引擎</h3>
                    <p>ReAct 循环 · 工具调用 · 多步推理</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">📚</div>
                    <h3>RAG 知识库</h3>
                    <p>文档上传 · 向量检索 · 语义理解</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🔧</div>
                    <h3>工具库</h3>
                    <p>计算器 · 联网搜索 · 代码执行</p>
                </div>
            </div>
            <div class="hero-actions">
                <a href="/chat" class="btn btn-primary">开始对话</a>
                <a href="/knowledge" class="btn btn-secondary">管理知识库</a>
            </div>
            <div class="tech-stack">
                <span class="tech-badge">Java 17</span>
                <span class="tech-badge">Spring Boot 3</span>
                <span class="tech-badge">Zhipu GLM</span>
                <span class="tech-badge">RAG</span>
                <span class="tech-badge">ReAct Agent</span>
            </div>
        </div>
    </div>
</body>
</html>
